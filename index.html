<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MotoForce AI</title>
<meta name="theme-color" content="#1a4a7a">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:linear-gradient(135deg,#b8d0e8 0%,#cce0f0 50%,#a8c8e0 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
.card{background:rgba(255,255,255,0.75);border:1px solid rgba(30,80,140,0.15);border-radius:24px;padding:40px 48px;text-align:center;box-shadow:0 8px 32px rgba(30,80,140,0.12);max-width:420px;width:90%;}
.logo{font-size:32px;font-weight:800;color:#1a3560;margin-bottom:4px;}
.logo span{color:#b8860b;}
.sub{font-size:13px;color:rgba(30,70,120,0.55);margin-bottom:32px;}
.btn{display:flex;align-items:center;gap:12px;padding:14px 20px;border-radius:14px;text-decoration:none;font-size:14px;font-weight:700;margin-bottom:12px;transition:opacity 0.15s;}
.btn:hover{opacity:0.85;}
.btn-mobile{background:linear-gradient(135deg,#1a4a7a,#1e5a94);color:#fff;}
.btn-desktop{background:rgba(255,255,255,0.85);border:1px solid rgba(30,80,140,0.2);color:#1a3560;}
.btn-icon{font-size:22px;width:32px;text-align:center;}
.btn-text{text-align:left;}
.btn-title{display:block;}
.btn-sub{font-size:11px;font-weight:400;opacity:0.75;}
.hint{font-size:11px;color:rgba(30,70,120,0.4);margin-top:16px;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Moto<span>Force</span> AI</div>
  <div class="sub">Sales Intelligence</div>
  <a class="btn btn-mobile" href="/mobile.html">
    <span class="btn-icon">📱</span>
    <span class="btn-text">
      <span class="btn-title">Mobile App</span>
      <span class="btn-sub">Für Smartphone & Tablet</span>
    </span>
  </a>
  <a class="btn btn-desktop" href="/desktop.html">
    <span class="btn-icon">🖥</span>
    <span class="btn-text">
      <span class="btn-title">Desktop Version</span>
      <span class="btn-sub">Für PC & Laptop</span>
    </span>
  </a>
  <div class="hint">Weiterleitung erfolgt automatisch...</div>
</div>
<script>
var w = window.innerWidth;
var mobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent) || w < 768;
setTimeout(function(){
  window.location.href = mobile ? '/mobile.html' : '/desktop.html';
}, 1200);
</script>
</body>
</html>
